openapi: 3.0.3
info:
  title: Demo Credit API
  version: 1.0.0
  description: API documentation for the Demo Credit wallet service.
servers:
  - url: http://localhost:5000
    description: Local development server
tags:
  - name: Health
  - name: Auth
  - name: Wallets
  - name: Transactions
paths:
  /health:
    get:
      tags:
        - Health
      summary: Check API health
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Create a user account and wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/signin:
    post:
      tags:
        - Auth
      summary: Sign in and rotate faux auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: Signin successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SigninResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /wallets/fund:
    post:
      tags:
        - Wallets
      summary: Fund authenticated user's wallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAmountRequest"
      responses:
        "200":
          description: Wallet funded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundWalletResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /wallets/withdraw:
    post:
      tags:
        - Wallets
      summary: Withdraw from authenticated user's wallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAmountRequest"
      responses:
        "200":
          description: Withdrawal successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawWalletResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /wallets/transfer:
    post:
      tags:
        - Wallets
      summary: Transfer funds to another wallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferFundsRequest"
      responses:
        "200":
          description: Transfer successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferFundsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /transactions:
    get:
      tags:
        - Transactions
      summary: List authenticated user's wallet transactions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          required: false
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
      responses:
        "200":
          description: Transactions retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransactionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: faux-token
  responses:
    BadRequest:
      description: Request validation failed or business rule failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Authentication token is required.
        code:
          type: string
          nullable: true
          example: UNAUTHENTICATED
    SignupRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - phone_number
        - bvn
        - password
      properties:
        first_name:
          type: string
          maxLength: 100
          example: Ada
        last_name:
          type: string
          maxLength: 100
          example: Okafor
        email:
          type: string
          format: email
          maxLength: 255
          example: ada.okafor@example.com
        phone_number:
          type: string
          example: "08012345678"
        bvn:
          type: string
          pattern: "^\\d{11}$"
          example: "12345678901"
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          example: Password123
    SigninRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ada.okafor@example.com
        password:
          type: string
          format: password
          example: Password123
    WalletAmountRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: integer
          minimum: 1
          description: Amount in kobo.
          example: 500000
        description:
          type: string
          maxLength: 255
          example: Test wallet funding
    TransferFundsRequest:
      type: object
      required:
        - recipient_account_number
        - amount
      properties:
        recipient_account_number:
          type: string
          pattern: "^\\d{10}$"
          example: "1234567891"
        amount:
          type: integer
          minimum: 1
          description: Amount in kobo.
          example: 200000
        description:
          type: string
          maxLength: 255
          example: Test transfer
    User:
      type: object
      required:
        - id
        - first_name
        - last_name
        - email
        - phone_number
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
          example: Ada
        last_name:
          type: string
          example: Okafor
        email:
          type: string
          format: email
          example: ada.okafor@example.com
        phone_number:
          type: string
          example: "08012345678"
    Wallet:
      type: object
      required:
        - id
        - account_number
        - balance
        - currency
      properties:
        id:
          type: string
          format: uuid
        account_number:
          type: string
          example: "1234567890"
        balance:
          type: integer
          example: 500000
        currency:
          type: string
          example: NGN
    Transaction:
      type: object
      required:
        - id
        - type
        - amount
        - balance_before
        - balance_after
        - reference
        - status
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - fund
            - withdrawal
            - transfer_in
            - transfer_out
        amount:
          type: integer
          example: 200000
        balance_before:
          type: integer
          example: 500000
        balance_after:
          type: integer
          example: 300000
        reference:
          type: string
          example: WDR_generated-reference
        related_transaction_id:
          type: string
          nullable: true
          example: null
        counterparty_wallet_id:
          type: string
          nullable: true
          example: null
        status:
          type: string
          enum:
            - pending
            - successful
            - failed
            - reversed
          example: successful
        description:
          type: string
          nullable: true
          example: Test withdrawal
        created_at:
          type: string
          format: date-time
    OperationTransaction:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          properties:
            created_at:
              readOnly: true
    SignupResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Account created successfully.
        data:
          type: object
          required:
            - user
            - wallet
            - token
          properties:
            user:
              $ref: "#/components/schemas/User"
            wallet:
              $ref: "#/components/schemas/Wallet"
            token:
              type: string
              example: demo_generated_auth_token
    SigninResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Signin successful.
        data:
          type: object
          required:
            - user
            - token
          properties:
            user:
              $ref: "#/components/schemas/User"
            token:
              type: string
              example: demo_rotated_auth_token
    FundWalletResponse:
      $ref: "#/components/schemas/WalletOperationResponse"
    WithdrawWalletResponse:
      $ref: "#/components/schemas/WalletOperationResponse"
    WalletOperationResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Wallet operation successful.
        data:
          type: object
          required:
            - wallet
            - transaction
          properties:
            wallet:
              $ref: "#/components/schemas/Wallet"
            transaction:
              $ref: "#/components/schemas/Transaction"
    TransferFundsResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Transfer successful.
        data:
          type: object
          required:
            - sender_wallet
            - recipient_wallet
            - transactions
          properties:
            sender_wallet:
              $ref: "#/components/schemas/Wallet"
            recipient_wallet:
              type: object
              required:
                - id
                - account_number
                - currency
              properties:
                id:
                  type: string
                  format: uuid
                account_number:
                  type: string
                  example: "1234567891"
                currency:
                  type: string
                  example: NGN
            transactions:
              type: object
              required:
                - debit
                - credit
              properties:
                debit:
                  $ref: "#/components/schemas/Transaction"
                credit:
                  $ref: "#/components/schemas/Transaction"
    ListTransactionsResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Transactions retrieved successfully.
        data:
          type: object
          required:
            - pagination
            - transactions
          properties:
            pagination:
              type: object
              required:
                - page
                - limit
                - total
                - total_pages
              properties:
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 20
                total:
                  type: integer
                  example: 2
                total_pages:
                  type: integer
                  example: 1
            transactions:
              type: array
              items:
                $ref: "#/components/schemas/Transaction"
